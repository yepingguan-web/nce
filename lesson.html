<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>课文 - NCE-Flow-Plus</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <!-- 顶部导航 -->
  <nav class="navbar">
    <div class="nav-left">
      <button class="back-btn" onclick="history.back()">← 返回</button>
      <h1 class="nav-title">Lesson 1 - A Private Conversation</h1>
    </div>
    <div class="nav-actions">
      <button class="theme-toggle" title="切换主题">🌓</button>
      <div class="view-mode">
        <button class="view-btn active" data-mode="en">EN</button>
        <button class="view-btn" data-mode="en-cn">EN+CN</button>
        <button class="view-btn" data-mode="cn">CN</button>
      </div>
    </div>
  </nav>

  <!-- 播放控制栏 -->
  <div class="player-controls">
    <div class="control-left">
      <button class="play-btn" id="playBtn">▶ 播放</button>
      <button class="pause-btn" id="pauseBtn">⏸ 暂停</button>
    </div>
    <div class="control-center">
      <label>倍速：</label>
      <select id="speedSelect">
        <option value="0.5">0.5x</option>
        <option value="0.75">0.75x</option>
        <option value="1.0" selected>1.0x</option>
        <option value="1.25">1.25x</option>
        <option value="1.5">1.5x</option>
        <option value="2.0">2.0x</option>
      </select>
      <button class="loop-btn" id="loopBtn">🔁 循环：关</button>
    </div>
    <div class="control-right">
      <button class="follow-read-toggle" id="followReadToggle">🎤 跟读模式：关</button>
    </div>
  </div>

  <!-- 句子列表 -->
  <main class="lesson-container">
    <div class="sentences-list" id="sentencesList">
      <!-- 示例句子 -->
      <div class="sentence-item" data-sentence-id="s1" data-original-text="Last week I went to the theatre.">
        <div class="sentence-header">
          <span class="sentence-number">1</span>
          <button class="play-sentence-btn" title="播放此句">▶</button>
          <button class="follow-read-btn" title="跟读此句">🎤 跟读</button>
        </div>
        <div class="sentence-content">
          <div class="text-en">Last week I went to the theatre.</div>
          <div class="text-cn" style="display: none;">上周我去看戏。</div>
        </div>
        <div class="sentence-actions">
          <button class="action-btn" title="收藏">☆</button>
          <button class="action-btn" title="加入清单">📋</button>
        </div>
        <!-- 跟读评分结果（默认隐藏） -->
        <div class="score-result" id="score-s1" style="display: none;">
          <div class="score-badge">📊 上次评分：<span class="score-value">85</span> 分</div>
          <button class="view-detail-btn">查看详情</button>
        </div>
      </div>

      <div class="sentence-item" data-sentence-id="s2" data-original-text="I had a very good seat.">
        <div class="sentence-header">
          <span class="sentence-number">2</span>
          <button class="play-sentence-btn" title="播放此句">▶</button>
          <button class="follow-read-btn" title="跟读此句">🎤 跟读</button>
        </div>
        <div class="sentence-content">
          <div class="text-en">I had a very good seat.</div>
          <div class="text-cn" style="display: none;">我的座位很好。</div>
        </div>
        <div class="sentence-actions">
          <button class="action-btn" title="收藏">☆</button>
          <button class="action-btn" title="加入清单">📋</button>
        </div>
        <div class="score-result" id="score-s2" style="display: none;">
          <div class="score-badge">📊 上次评分：<span class="score-value">92</span> 分</div>
          <button class="view-detail-btn">查看详情</button>
        </div>
      </div>

      <div class="sentence-item" data-sentence-id="s3" data-original-text="The play was very interesting.">
        <div class="sentence-header">
          <span class="sentence-number">3</span>
          <button class="play-sentence-btn" title="播放此句">▶</button>
          <button class="follow-read-btn" title="跟读此句">🎤 跟读</button>
        </div>
        <div class="sentence-content">
          <div class="text-en">The play was very interesting.</div>
          <div class="text-cn" style="display: none;">剧情很有趣。</div>
        </div>
        <div class="sentence-actions">
          <button class="action-btn" title="收藏">☆</button>
          <button class="action-btn" title="加入清单">📋</button>
        </div>
      </div>

      <div class="sentence-item" data-sentence-id="s4" data-original-text="I did not enjoy it.">
        <div class="sentence-header">
          <span class="sentence-number">4</span>
          <button class="play-sentence-btn" title="播放此句">▶</button>
          <button class="follow-read-btn" title="跟读此句">🎤 跟读</button>
        </div>
        <div class="sentence-content">
          <div class="text-en">I did not enjoy it.</div>
          <div class="text-cn" style="display: none;">但我并不喜欢它。</div>
        </div>
        <div class="sentence-actions">
          <button class="action-btn" title="收藏">☆</button>
          <button class="action-btn" title="加入清单">📋</button>
        </div>
      </div>

      <!-- 更多句子... -->
    </div>
  </main>

  <!-- 评分弹窗（动态生成） -->
  <div id="scoreModalContainer"></div>

  <!-- 底部快捷栏 -->
  <div class="shortcuts-bar">
    <div class="shortcut-info">
      <span>💡 快捷键：</span>
      <kbd>空格</kbd> 播放/暂停 |
      <kbd>←</kbd> <kbd>→</kbd> 切换句子 |
      <kbd>F</kbd> 跟读当前句
    </div>
  </div>

  <script src="assets/recorder.js"></script>
  <script src="assets/scorer.js"></script>
  <script src="assets/app.js"></script>
  <script>
    // 课文页面特定逻辑
    document.addEventListener('DOMContentLoaded', () => {
      // 视图模式切换
      document.querySelectorAll('.view-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          
          const mode = btn.dataset.mode;
          document.querySelectorAll('.text-cn').forEach(el => {
            el.style.display = (mode === 'en') ? 'none' : 'block';
          });
        });
      });

      // 播放控制
      document.getElementById('playBtn').addEventListener('click', () => {
        console.log('▶ 开始播放课文');
        // 实现播放逻辑
      });

      document.getElementById('pauseBtn').addEventListener('click', () => {
        console.log('⏸ 暂停播放');
        // 实现暂停逻辑
      });

      // 倍速控制
      document.getElementById('speedSelect').addEventListener('change', (e) => {
        const speed = parseFloat(e.target.value);
        console.log('⚡ 倍速：', speed + 'x');
        // 实现倍速逻辑
      });

      // 跟读模式切换
      let followReadMode = false;
      document.getElementById('followReadToggle').addEventListener('click', () => {
        followReadMode = !followReadMode;
        document.getElementById('followReadToggle').textContent = 
          `🎤 跟读模式：${followReadMode ? '开' : '关'}`;
        console.log('🎤 跟读模式：', followReadMode);
      });

      // 句子播放按钮
      document.querySelectorAll('.play-sentence-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const sentenceItem = btn.closest('.sentence-item');
          const sentenceId = sentenceItem.dataset.sentenceId;
          console.log('▶ 播放句子：', sentenceId);
          // 实现句子播放逻辑
        });
      });

      // 跟读按钮（已在 app.js 中绑定）
    });
  </script>
</body>
</html>
