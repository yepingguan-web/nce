<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>课文 - NCE-Flow-Plus</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <!-- 顶部导航 -->
  <nav class="navbar">
    <div class="nav-left">
      <button class="back-btn" onclick="history.back()">← 返回</button>
      <h1 class="nav-title" id="navTitle">加载中...</h1>
    </div>
    <div class="nav-actions">
      <button class="theme-toggle" title="切换主题">🌓</button>
      <div class="view-mode">
        <button class="view-btn active" data-mode="en">EN</button>
        <button class="view-btn" data-mode="en-cn">EN+CN</button>
        <button class="view-btn" data-mode="cn">CN</button>
      </div>
    </div>
  </nav>

  <!-- 播放控制栏 -->
  <div class="player-controls">
    <div class="control-left">
      <button class="play-btn" id="playBtn">▶ 播放</button>
      <button class="pause-btn" id="pauseBtn">⏸ 暂停</button>
    </div>
    <div class="control-center">
      <label>倍速：</label>
      <select id="speedSelect">
        <option value="0.5">0.5x</option>
        <option value="0.75">0.75x</option>
        <option value="1.0" selected>1.0x</option>
        <option value="1.25">1.25x</option>
        <option value="1.5">1.5x</option>
        <option value="2.0">2.0x</option>
      </select>
      <button class="loop-btn" id="loopBtn">🔁 循环：关</button>
    </div>
    <div class="control-right">
      <button class="follow-read-toggle" id="followReadToggle">🎤 跟读模式：关</button>
    </div>
  </div>

  <!-- 句子列表 -->
  <main class="lesson-container">
    <!-- 加载中 -->
    <div id="loadingMessage" style="display:none; text-align:center; padding:2rem;">
      <p>⏳ 正在加载课文数据...</p>
    </div>

    <!-- 错误信息 -->
    <div id="errorMessage" style="display:none; text-align:center; padding:2rem; color:var(--error, #e53e3e);">
      <p id="errorText"></p>
      <a href="index.html" style="color:var(--accent, #6366f1);">← 返回首页</a>
    </div>

    <!-- 动态生成的句子列表 -->
    <div class="sentences-list" id="sentencesList"></div>
  </main>

  <!-- 评分弹窗容器 -->
  <div id="scoreModalContainer"></div>

  <!-- 底部快捷栏 -->
  <div class="shortcuts-bar">
    <div class="shortcut-info">
      <span>💡 快捷键：</span>
      <kbd>空格</kbd> 播放/暂停 |
      <kbd>←</kbd> <kbd>→</kbd> 切换句子 |
      <kbd>F</kbd> 跟读当前句
    </div>
    <a href="index.html#donate" class="donate-link" title="赞赏支持">☕ 赞赏</a>
  </div>

  <!-- 脚本加载（按依赖顺序） -->
  <script src="assets/lrc-parser.js"></script>
  <script src="assets/lesson-loader.js"></script>
  <script src="assets/audio-player.js"></script>
  <script src="assets/recorder.js"></script>
  <script src="assets/scorer.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
